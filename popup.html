<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Chatbot Connector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    
    .title {
      font-size: 14px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 11px;
      color: #888;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    
    .toggle-label {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #444;
      transition: .3s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF50;
    }
    
    .status-dot.disconnected {
      background: #f44336;
    }
    
    .status-dot.connecting {
      background: #ff9800;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-size: 12px;
      color: #ccc;
    }
    
    .platform-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(102, 126, 234, 0.2);
      border-radius: 4px;
      font-size: 11px;
      color: #667eea;
    }
    
    .btn {
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .btn:hover {
      opacity: 0.9;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .platform-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .platform-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
    }
    
    .platform-name {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .platform-icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    
    .whatsapp { background: #25D366; }
    .telegram { background: #0088cc; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">UC</div>
    <div>
      <div class="title">Universal Chatbot</div>
      <div class="subtitle">AI Assistant Connector</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">Status</div>
    <div class="status-row">
      <div class="status-dot" id="nativeStatus"></div>
      <span class="status-text" id="nativeStatusText">Connecting...</span>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">Extension</div>
    <div class="toggle-row">
      <span class="toggle-label">Enabled</span>
      <label class="toggle-switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">Platforms</div>
    <div class="platform-list">
      <div class="platform-item">
        <span class="platform-name">
          <span class="platform-icon whatsapp">W</span>
          WhatsApp Web
        </span>
        <label class="toggle-switch">
          <input type="checkbox" class="platform-toggle" data-platform="web.whatsapp.com" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="platform-item">
        <span class="platform-name">
          <span class="platform-icon telegram">T</span>
          Telegram Web
        </span>
        <label class="toggle-switch">
          <input type="checkbox" class="platform-toggle" data-platform="web.telegram.org" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>
  
  <div class="section">
    <button class="btn" id="reconnectBtn">Reconnect to Native Host</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
