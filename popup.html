<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Chatbot</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-wrapper">
        <img src="icons/icon128.svg" class="logo" alt="UniversalChatbot">
      </div>
      <div class="title-wrapper">
        <h1>UniversalChatbot</h1>
        <span class="version">v0.1.0</span>
      </div>
    </div>
    
    <!-- Status Card -->
    <div class="status-card">
      <div class="status-indicator" id="status-dot">
        <span class="status-pulse"></span>
      </div>
      <div class="status-info">
        <span id="status-text">Connecting...</span>
        <span id="status-subtext">to native host</span>
      </div>
    </div>
    
    <!-- Platform Toggles -->
    <div class="platforms-section">
      <h2 class="section-title">Active Platforms</h2>
      <div class="platform-toggles">
        <label class="toggle-item" for="whatsapp-toggle">
          <div class="toggle-info">
            <div class="platform-icon whatsapp-bg">
              <i data-lucide="message-circle"></i>
            </div>
            <span class="platform-name">WhatsApp</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="whatsapp-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </label>
        
        <label class="toggle-item" for="telegram-toggle">
          <div class="toggle-info">
            <div class="platform-icon telegram-bg">
              <i data-lucide="send"></i>
            </div>
            <span class="platform-name">Telegram</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="telegram-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </label>
        
        <label class="toggle-item" for="discord-toggle">
          <div class="toggle-info">
            <div class="platform-icon discord-bg">
              <i data-lucide="gamepad-2"></i>
            </div>
            <span class="platform-name">Discord</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="discord-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </label>
      </div>
    </div>
    
    <!-- Extension Toggle -->
    <div class="extension-toggle-section">
      <label class="toggle-item" for="extension-toggle">
        <div class="toggle-info">
          <div class="platform-icon extension-icon">
            <i data-lucide="zap"></i>
          </div>
          <span class="platform-name">Extension Enabled</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="extension-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </label>
    </div>
    
    <!-- Actions -->
    <div class="actions">
      <button id="open-dashboard" class="btn secondary">
        <i data-lucide="layout-dashboard"></i>
        <span>Dashboard</span>
      </button>
      <button id="reconnect-btn" class="btn primary">
        <i data-lucide="refresh-cw"></i>
        <span>Reconnect</span>
      </button>
    </div>
    
    <!-- Footer -->
    <div class="footer">
      <a href="#" id="settings-link" class="footer-link">
        <i data-lucide="settings"></i>
        <span>Settings</span>
      </a>
      <a href="#" id="help-link" class="footer-link">
        <i data-lucide="help-circle"></i>
        <span>Help</span>
      </a>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
